<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias! | MyG Inmobiliaria</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #f8f9fa; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            text-align: center;
        }
        .container { 
            background: white; 
            padding: 3rem; 
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { color: #2c3e50; margin-bottom: 1rem; }
        p { color: #666; margin-bottom: 2rem; line-height: 1.6; }
        .btn { 
            display: inline-block; 
            padding: 1rem 2rem; 
            background: #e67e22; 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 600;
        }
        .btn:hover { background: #d35400; }
        .tiempo { color: #e67e22; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>¡Mensaje enviado!</h1>
        <p>Hemos recibido tu solicitud correctamente.<br>
        Nos pondremos en contacto contigo en <span class="tiempo">menos de 24 horas</span>.</p>
        <a href="index.html" class="btn">Volver a la web</a>
    </div>
</body>
</html>
